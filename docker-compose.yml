version: "3.8"

services:

  frontend:
    build: ./frontend
    image: apsalbehath26/frontend:latest
    ports:
      - "3000:3000"

    depends_on:
      - backend

  backend:
    build: ./backend
    image: apsalbehath26/backend:latest

    ports:
      - "5000:5000"

    environment:
      DB_HOST: database
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: fullstackdb

    depends_on:
      - database

  database:
    image: mysql:8

    container_name: mysql-db

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: fullstackdb

    ports:
      - "3306:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:

  mysql-data:
